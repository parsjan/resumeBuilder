services:

  # ── PostgreSQL ─────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: ai_resume_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB:       ${DB_NAME:-ai_resume_db}
      POSTGRES_USER:     ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-postgres} -d ${DB_NAME:-ai_resume_db}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ── Backend ────────────────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai_resume_backend
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      # Database
      DB_HOST:     postgres
      DB_PORT:     5432
      DB_NAME:     ${DB_NAME:-ai_resume_db}
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-secret}

      # JWT
      JWT_SECRET:              ${JWT_SECRET:-CHANGE_ME_use_a_256bit_or_longer_random_secret_in_production}
      JWT_EXPIRATION_MS:       ${JWT_EXPIRATION_MS:-86400000}
      JWT_REFRESH_EXPIRATION_MS: ${JWT_REFRESH_EXPIRATION_MS:-604800000}

      # OpenAI
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-placeholder}

      # OAuth2
      GOOGLE_CLIENT_ID:     ${GOOGLE_CLIENT_ID:-placeholder}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-placeholder}
      GITHUB_CLIENT_ID:     ${GITHUB_CLIENT_ID:-placeholder}
      GITHUB_CLIENT_SECRET: ${GITHUB_CLIENT_SECRET:-placeholder}
      OAUTH2_REDIRECT_URI:  ${OAUTH2_REDIRECT_URI:-http://localhost:3000/oauth2/callback}

      # AWS / S3
      AWS_ACCESS_KEY_ID:     ${AWS_ACCESS_KEY_ID:-placeholder}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-placeholder}
      AWS_REGION:            ${AWS_REGION:-us-east-1}
      AWS_S3_BUCKET:         ${AWS_S3_BUCKET:-ai-resume-builder-files}

      # CORS
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/api/v1/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s

  # ── Frontend ───────────────────────────────────────────────────────────────
