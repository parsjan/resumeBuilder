server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: ai-resume-builder

  # ── Database ──────────────────────────────────────────────────────────────
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:ai_resume_db}
    username: ${DB_USERNAME:postgres}
    password: ${DB_PASSWORD:secret}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 20000
      idle-timeout: 300000

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
        default_schema: public
        jdbc:
          time_zone: UTC

  # ── Flyway ────────────────────────────────────────────────────────────────
  # Disabled by default. Enabled automatically on the "local" profile.
  # In production, run migrations manually before deploying the app.
  flyway:
    enabled: false
    locations: classpath:db/migration
    baseline-on-migrate: false
    validate-on-migrate: true
    out-of-order: false

  # ── OAuth2 Social Login ────────────────────────────────────────────────────
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID:placeholder}
            client-secret: ${GOOGLE_CLIENT_SECRET:placeholder}
            scope: email, profile
          github:
            client-id: ${GITHUB_CLIENT_ID:placeholder}
            client-secret: ${GITHUB_CLIENT_SECRET:placeholder}
            scope: user:email

  # ── Jackson ───────────────────────────────────────────────────────────────
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
    default-property-inclusion: non_null
    time-zone: UTC

# ── Application-specific ────────────────────────────────────────────────────
app:

  jwt:
    secret: ${JWT_SECRET:CHANGE_ME_use_a_256bit_or_longer_random_secret_in_production}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}        # 1 day
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}  # 7 days

  openai:
    api-key: ${OPENAI_API_KEY:sk-placeholder}
    base-url: https://api.openai.com/v1
    model: gpt-4o
    max-tokens: 4096
    timeout-seconds: 60

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:5173}

  file:
    max-size-mb: 10
    allowed-types: application/pdf,application/msword,application/vnd.openxmlformats-officedocument.wordprocessingml.document,image/jpeg,image/png

  aws:
    access-key-id: ${AWS_ACCESS_KEY_ID:placeholder}
    secret-access-key: ${AWS_SECRET_ACCESS_KEY:placeholder}
    region: ${AWS_REGION:us-east-1}
    s3:
      bucket-name: ${AWS_S3_BUCKET:ai-resume-builder-files}
      signed-url-expiration-minutes: ${S3_SIGNED_URL_EXPIRY_MINUTES:60}

# ── Actuator ─────────────────────────────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never

# ── Logging ──────────────────────────────────────────────────────────────────
logging:
  level:
    root: INFO
    com.app: DEBUG
    org.springframework.security: INFO
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
